<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WOWVoice · 발표자 뷰</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.min.css"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <!-- body.present 클래스로 큰 화면용 스타일 적용 -->
  <body class="present">
    <div class="present-wrap">
      <header class="present-header">
        <div class="brand">WOW<span class="v">V</span>oice · 받은 질문</div>
        <p class="subtitle">좋아요가 많은 질문이 위로 올라갑니다</p>
      </header>

      <ul class="present-list" id="presentList">
        <li class="empty-state" style="color: rgba(255, 255, 255, 0.7)">
          불러오는 중...
        </li>
      </ul>

      <!-- URL + QR 코드를 나란히 표시 -->
      <footer class="present-footer">
        <div class="footer-url-wrap">
          <span id="footerUrl">voice.wowdlab.com</span>
          <div class="footer-hint">QR로 접속하세요 →</div>
        </div>
        <div id="qrCode" class="qr-code-wrap"></div>
      </footer>
    </div>

    <!-- 발표자 뷰: config → client → present (폼·좋아요 로직 불필요) -->
    <script
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
      defer
    ></script>
    <!-- QR 코드 생성 라이브러리 -->
    <script
      src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"
      defer
    ></script>
    <script src="js/config.js" defer></script>
    <script src="js/supabase-client.js" defer></script>
    <script src="js/present.js" defer></script>
  </body>
</html>
